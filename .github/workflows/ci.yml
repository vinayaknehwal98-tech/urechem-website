name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Lint, image audit, build and route smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Audit unique image usage
        run: npm run audit:images

      - name: Build
        run: npm run build

      - name: Start production server
        run: |
          npm run start -- --hostname 127.0.0.1 --port 3000 > /tmp/urechem-next.log 2>&1 &
          echo "$!" > /tmp/urechem-next.pid

      - name: Wait for production server
        run: |
          for attempt in {1..60}; do
            if curl -fsS http://127.0.0.1:3000/sitemap.xml >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/urechem-next.log
          exit 1

      - name: Smoke test every sitemap route
        run: npm run smoke:routes
